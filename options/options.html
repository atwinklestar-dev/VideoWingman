<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoWingman — Settings</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        max-width: 520px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.5;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 4px;
      }
      p.sub {
        margin-top: 0;
        color: #666;
        font-size: 13px;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin: 20px 0 6px;
      }
      .key-row {
        display: flex;
        gap: 8px;
      }
      input[type="text"],
      input[type="password"] {
        flex: 1;
        padding: 8px 10px;
        font-size: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        border: 1px solid #bbb;
        border-radius: 6px;
      }
      button {
        padding: 8px 14px;
        font-size: 14px;
        border: 1px solid #bbb;
        border-radius: 6px;
        background: #f4f4f4;
        cursor: pointer;
      }
      button.primary {
        background: #ff0000;
        color: #fff;
        border-color: #ff0000;
        font-weight: 600;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #status {
        font-size: 13px;
      }
      #status.ok {
        color: #1a7f37;
      }
      #status.err {
        color: #c0392b;
      }
      a {
        color: #c00;
      }
    </style>
  </head>
  <body>
    <h1>VideoWingman</h1>
    <p class="sub">
      Chat with any YouTube video using its transcript and Claude AI.
    </p>

    <label for="apiKey">Anthropic API key</label>
    <div class="key-row">
      <input
        type="password"
        id="apiKey"
        placeholder="sk-ant-..."
        autocomplete="off"
        spellcheck="false"
      />
      <button type="button" id="toggle">Show</button>
    </div>
    <p class="sub">
      Stored in your browser only. Get a key from
      <a
        href="https://console.anthropic.com/settings/keys"
        target="_blank"
        rel="noopener"
        >console.anthropic.com</a
      >.
    </p>

    <div class="actions">
      <button type="button" id="save" class="primary">Save</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
